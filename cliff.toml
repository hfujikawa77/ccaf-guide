# git-cliff configuration for ccaf-guide
# https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md from Conventional Commits touching content/.
# Run via: npm run changelog
#
# Filtering happens at two layers:
#   1. CLI: --include-path 'content/**' (only commits that touch content/ are considered)
#   2. commit_parsers below (only feat / fix / refactor / perf are surfaced;
#      docs / test / chore / style / ci on content/ are dropped)

[changelog]
header = """
# Changelog

This file is **auto-generated** from [Conventional Commits](https://www.conventionalcommits.org/) touching `content/` via [`git-cliff`](https://git-cliff.org/). It is not a hand-curated changelog in the [Keep a Changelog](https://keepachangelog.com/) sense — each entry corresponds to a single commit, in commit-message phrasing, without editorial grouping or rewriting for end users.

Versions are tagged by date (no semver — this is a docs site, not a library). To regenerate:

```bash
npm run changelog
```

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") -%}
### {{ group | striptags | trim }}

{% for commit in commits -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true
render_always = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
commit_preprocessors = []
protect_breaking_commits = false

# Map Conventional Commit types to Keep a Changelog groups.
# The `<!-- N -->` prefix sets group ordering; striptags removes it from output.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^refactor", group = "<!-- 2 -->Changed" },
    { message = "^perf", group = "<!-- 2 -->Changed" },
    # Everything else (docs, test, chore, style, ci, build) is dropped from the changelog
    # even if it touches content/ — those are not user-facing changes.
    { message = ".*", skip = true },
]
filter_commits = true
fail_on_unmatched_commit = false
link_parsers = []
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
