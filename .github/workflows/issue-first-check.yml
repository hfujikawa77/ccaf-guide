name: issue-first-check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    steps:
      - name: Verify PR links to an existing open issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          # Use GitHub's own closing-keyword parser via closingIssuesReferences.
          # This handles all keyword variants (close/closes/closed, fix/fixes/fixed,
          # resolve/resolves/resolved) and the optional colon form ("Closes: #N"),
          # and only returns references to issues that actually exist. We use the
          # GraphQL endpoint (not `gh pr view --json`) because the latter's flat
          # schema does not expose the `state` field on nested issue references.
          RESPONSE=$(gh api graphql \
            -F owner="$REPO_OWNER" \
            -F repo="$REPO_NAME" \
            -F pr="$PR_NUMBER" \
            -f query='
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    closingIssuesReferences(first: 50) {
                      nodes { number state }
                    }
                  }
                }
              }')

          LINKED_OPEN=$(printf '%s' "$RESPONSE" \
            | jq -r '[.data.repository.pullRequest.closingIssuesReferences.nodes[] | select(.state == "OPEN") | .number] | join(", ")')

          if [ -z "${LINKED_OPEN:-}" ]; then
            echo "::error::This PR is not linked to any open issue."
            echo "::error::Add 'Closes #N' (or Fixes / Resolves #N) to the PR body, where #N is an existing open issue created before this branch was started."
            echo "::error::See CLAUDE.md (Issue-first workflow)."
            exit 1
          fi

          echo "OK: PR linked to open issue(s): #$LINKED_OPEN"
